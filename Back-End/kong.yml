_format_version: "2.1"
_transform: true

services:
  - name: notes-backend
    url: http://host.docker.internal:8001/
    routes:
      - name: notes-api-routes
        paths:
          - /api
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      second: 5
      hour: 10000
      policy: local
